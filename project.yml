name: Nocturn
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Nocturn:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Nocturn
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
          - "Driver/NocturnDriver.h"
          - "Driver/NocturnDriver.mm"
          - "Driver/NocturnDevice.h"
          - "Driver/NocturnDevice.mm"
    settings:
      base:
        PRODUCT_NAME: Nocturn
        PRODUCT_BUNDLE_IDENTIFIER: com.aymandakir.nocturn
        INFOPLIST_FILE: Nocturn/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nocturn/Nocturn.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: NocturnDriver
        embed: true
        copy:
          destination: plugins

  NocturnDriver:
    type: bundle
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Nocturn/Driver
        includes:
          - "NocturnDriver.h"
          - "NocturnDriver.mm"
          - "NocturnDevice.h"
          - "NocturnDevice.mm"
    settings:
      base:
        PRODUCT_NAME: NocturnDriver
        PRODUCT_BUNDLE_IDENTIFIER: com.aymandakir.nocturn.driver
        INFOPLIST_FILE: NocturnDriver/NocturnDriver-Info.plist
        WRAPPER_EXTENSION: driver
        GENERATE_INFOPLIST_FILE: NO
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        GCC_ENABLE_CPP_EXCEPTIONS: YES
        GCC_ENABLE_CPP_RTTI: YES
        MACH_O_TYPE: mh_bundle

  NocturnTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NocturnTests
    dependencies:
      - target: Nocturn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aymandakir.nocturn.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Nocturn:
    shared: true
    build:
      targets:
        Nocturn: all
        NocturnDriver: all
        NocturnTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NocturnTests
